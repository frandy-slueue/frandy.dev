services:
  postgres:
    image: postgres:16-alpine
    container_name: frandy_postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - frandy_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: frandy_fastapi
    env_file: .env
    volumes:
      - ./backend:/app
    networks:
      - frandy_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frandy_nextjs
    env_file: .env
    networks:
      - frandy_network
    depends_on:
      - fastapi
    restart: unless-stopped

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: frandy_umami
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET}
    networks:
      - frandy_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: frandy_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
    networks:
      - frandy_network
    depends_on:
      - nextjs
      - fastapi
      - umami
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  frandy_network:
    driver: bridge
