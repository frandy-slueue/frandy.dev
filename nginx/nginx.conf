worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Rate limiting for contact form
    limit_req_zone $binary_remote_addr zone=contact:10m rate=5r/m;

    # ── HTTP → HTTPS redirect ──────────────────────────────────
    server {
        listen 80;
        server_name frandy.dev www.frandy.dev;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ──────────────────────────────────────
    server {
        listen 443 ssl;
        server_name frandy.dev www.frandy.dev;

        ssl_certificate     /etc/letsencrypt/live/frandy.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/frandy.dev/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN"    always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        client_max_body_size 20M;

        # ── Frontend ───────────────────────────────────────────
        location / {
            proxy_pass         http://nextjs:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # ── API ────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://fastapi:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Rate limit contact form
        location /api/contact {
            limit_req zone=contact burst=3 nodelay;
            proxy_pass         http://fastapi:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Uploads ────────────────────────────────────────────
        location /uploads/ {
            proxy_pass         http://fastapi:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ── Analytics ──────────────────────────────────────────
        location /analytics/ {
            proxy_pass         http://umami:3001/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
